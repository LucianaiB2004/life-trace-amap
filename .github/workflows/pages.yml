name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build public demo
        run: |
          node life-trace/life-trace.mjs build life-trace/liu-bei.json life-trace/demo.html
          mkdir -p _site
          cp life-trace/demo.html _site/index.html
          printf 'window.__AMAP_CONFIG__ = { key: "%s" };\n' "${{ secrets.AMAP_KEY }}" > _site/__lifetrace_amap_config__.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Test Skill
        working-directory: life-trace
        run: |
          node --test test.mjs
          node life-trace.mjs validate liu-bei.json
          node life-trace.mjs build liu-bei.json demo.html
      - name: Check ClawHub package
        run: |
          npm install --global clawhub@0.23.1
          clawhub skill publish ./life-trace --slug life-trace --name "人生经纬 · LifeTrace" --version 1.0.0 --changelog "CI verification" --dry-run
